<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AHMET VE VELİ USTA - OTO SERVİS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f0f4f8; /* Hafif mavimsi ferah beyaz arka plan */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff; /* Tam beyaz kart arka planı */
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(11, 45, 92, 0.15); /* Koyu mavi tonlarında hafif gölge */
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin: 20px auto;
        }
        .logo-img {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        /* Ahmet ve Veli Usta yazısı (Kalın, Koyu ve Büyük Harf) */
        .usta-title {
            color: #000000; 
            font-size: 24px; 
            margin-bottom: 25px;
            font-weight: 800; 
            letter-spacing: 0.5px;
            text-transform: uppercase; /* Tüm harfleri büyük yapmaya zorlar */
        }
        .section-title {
            font-size: 13px;
            color: #5b738b; /* Başlık altı tonu */
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            text-align: left;
            border-bottom: 2px solid #e1e8ed;
            padding-bottom: 5px;
            font-weight: 700;
        }
        .btn {
            display: block;
            text-decoration: none;
            padding: 14px;
            margin: 12px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            transition: all 0.2s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(11, 45, 92, 0.2);
        }
        .btn:active {
            transform: scale(0.98);
        }
        
        /* Koyu Mavi - Beyaz Konsept Butonları */
        .btn-call { 
            background-color: #0b2d5c; /* Koyu Mavi Arka Plan */
            color: #ffffff;            /* Beyaz Yazı */
            border: 2px solid #0b2d5c; /* Koyu Mavi Çerçeve */
        }       
        .btn-maps { 
            background-color: #ffffff; /* Beyaz Arka Plan */
            color: #0b2d5c;            /* Koyu Mavi Yazı */
            border: 2px solid #0b2d5c; /* Koyu Mavi Çerçeve */
        } 
        /* Hover (Üzerine gelince) renk değişimi efekti */
        .btn-call:hover { background-color: #0d3873; border-color: #0d3873; }
        .btn-maps:hover { background-color: #f0f4f8; }
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="OTO SERVİS LOGO" class="logo-img">
    
    <div class="usta-title">AHMET VE VELİ USTA</div>
    
    <div class="section-title">📍 İletişim & Ulaşım</div>
    
    <a href="tel:+905067567644" class="btn btn-call">📞 Servis Yetkilisi Ara</a>
    
    <a href="https://www.google.com/maps/place/G%C3%9CNEYDO%C4%9EU+SUZUK%C4%B0+AHMET+VEL%C4%B0+USTA/@37.0795294,37.4393595,17.75z/data=!4m6!3m5!1s0x1531e500119a7321:0xfa0b09bae8d1962f!8m2!3d37.079372!4d37.439115!16s%2Fg%2F11yr_0v4r0?entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn btn-maps">🗺️ Yol Tarifi / Konum</a>
</div>

</body>
</html>
