<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GÜNEYDOĞU OTO SERVİS</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f6f9; /* Sayfa arka planı */
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .container {
            background-color: #ffffff;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 360px;
            width: 90%;
            margin: 20px auto;
        }
        .logo-img {
            width: 200px;
            height: auto;
            margin-bottom: 20px;
            border-radius: 8px;
        }
        h1 {
            color: #1e293b; /* Başlık rengi */
            font-size: 22px;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            line-height: 1.3;
            font-weight: 700;
        }
        /* İstediğiniz gibi daha kalın ve koyu yapılan usta alt başlığı */
        .usta-title {
            color: #000000; /* Tam koyu siyah */
            font-size: 19px;
            margin-bottom: 25px;
            font-weight: 800; /* Maksimum kalınlık */
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }
        .section-title {
            font-size: 13px;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin: 20px 0 12px;
            text-align: left;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 5px;
            font-weight: 700;
        }
        .btn {
            display: block;
            color: white;
            text-decoration: none;
            padding: 15px;
            margin: 12px 0;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            transition: transform 0.1s, opacity 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.08);
        }
        .btn:hover {
            opacity: 0.9;
        }
        .btn:active {
            transform: scale(0.98);
        }
        /* Oto servis temasına uygun güçlü renk tonları */
        .btn-call { 
            background-color: #dc2626; /* Güçlü Servis Kırmızısı */
        }       
        .btn-maps { 
            background-color: #1e293b; /* Koyu Antrasit / Şık Gri */
        } 
    </style>
</head>
<body>

<div class="container">
    <img src="logo.png" alt="GÜNEYDOĞU OTO SERVİS LOGO" class="logo-img">
    
    <h1>GÜNEYDOĞU OTO SERVİS</h1>
    
    <div class="usta-title">AHMET VELİ USTA</div>
    
    <div class="section-title">📍 İletişim & Ulaşım</div>
    
    <a href="tel:+905067567644" class="btn btn-call">📞 Ustayı Ara</a>
    
    <a href="https://www.google.com/maps/place/G%C3%9CNEYDO%C4%9EU+SUZUK%C4%B0+AHMET+VEL%C4%B0+USTA/@37.0795294,37.4393595,17.75z/data=!4m6!3m5!1s0x1531e500119a7321:0xfa0b09bae8d1962f!8m2!3d37.079372!4d37.439115!16s%2Fg%2F11yr_0v4r0?entry=ttu&g_ep=EgoyMDI2MDUxMy4wIKXMDSoASAFQAw%3D%3D" target="_blank" class="btn btn-maps">🗺️ Yol Tarifi / Konum</a>
</div>

</body>
</html>
